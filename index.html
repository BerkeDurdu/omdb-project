<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Discover movies and series with CineSearch — a beautiful movie search app powered by the OMDB API. Find titles, ratings, cast, and more.">
  <meta name="keywords" content="movie search, OMDB, film database, movie ratings, series, cinema">
  <meta name="author" content="Berke Durdu">

  <!-- Open Graph -->
  <meta property="og:title" content="CineSearch — Movie Discovery App">
  <meta property="og:description" content="Search and discover movies, series, and more with a beautiful, responsive interface.">
  <meta property="og:type" content="website">

  <title>CineSearch — Movie Discovery</title>

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><text y='56' font-size='56'>🎬</text></svg>">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <!-- ═══════════════════════════════════════
       HEADER
       ═══════════════════════════════════════ -->
  <header class="header" role="banner">
    <div class="container">
      <a class="header__logo" id="logo" href="#" aria-label="CineSearch Home">
        <span class="header__logo-icon">🎬</span>
        <span class="header__logo-text">Cine<span>Search</span></span>
      </a>

      <nav class="header__nav" aria-label="Main navigation">
        <div class="header__actions">
          <!-- Theme Toggle -->
          <button class="header__icon-btn" id="theme-toggle" aria-label="Toggle theme" title="Toggle light/dark mode">
            <svg class="theme-icon theme-icon--dark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            <svg class="theme-icon theme-icon--light" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          </button>

          <!-- Watchlist Badge -->
          <button class="header__icon-btn header__watchlist-btn" id="watchlist-toggle" aria-label="View watchlist" title="Watchlist">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            <span class="header__watchlist-count" id="watchlist-count" style="display:none;">0</span>
          </button>

          <a href="https://www.omdbapi.com/" target="_blank" rel="noopener noreferrer" class="header__api-link">
            OMDb API
          </a>
        </div>
      </nav>
    </div>
  </header>

  <!-- ═══════════════════════════════════════
       MAIN CONTENT
       ═══════════════════════════════════════ -->
  <main class="main" role="main">
    <div class="container">

      <!-- Hero Section -->
      <section class="hero" id="hero-section">
        <h1 class="hero__title">
          Discover Your Next <span class="hero__title-gradient">Favorite Movie</span>
        </h1>
        <p class="hero__subtitle">
          Search through thousands of movies and series. Get details, ratings, and everything you need — all in one place.
        </p>
      </section>

      <!-- Search Section -->
      <section class="search-section" id="search-section" aria-label="Search movies">
        <!-- Search Bar -->
        <div class="search-bar" id="search-bar">
          <span class="search-bar__icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/>
              <path d="m21 21-4.3-4.3"/>
            </svg>
          </span>
          <input 
            type="text" 
            class="search-bar__input" 
            id="search-input"
            placeholder="Search movies, series, episodes..."
            autocomplete="off"
            aria-label="Movie search query"
          >
          <button class="search-bar__btn" id="search-btn" aria-label="Search">
            <span class="search-bar__btn-text">Search</span>
            <svg class="search-bar__btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/>
              <path d="m21 21-4.3-4.3"/>
            </svg>
          </button>
        </div>

        <!-- Filters -->
        <div class="filters" id="filters">
          <div class="filter-group">
            <span class="filter-group__label">Type:</span>
            <button class="filter-btn" data-type="movie" id="filter-movie">Movie</button>
            <button class="filter-btn" data-type="series" id="filter-series">Series</button>
          </div>
          <div class="filter-group">
            <span class="filter-group__label">Year:</span>
            <input 
              type="number" 
              class="filter-input" 
              id="year-filter"
              placeholder="e.g. 2024"
              min="1900" 
              max="2030"
              aria-label="Filter by year"
            >
          </div>
        </div>
      </section>

      <!-- Results Section -->
      <section class="results-section hidden" id="results-section" aria-label="Search results">
        <div class="results__header">
          <p class="results__count" id="results-count"></p>
        </div>

        <!-- Movie Grid -->
        <div class="movie-grid" id="movie-grid" role="list"></div>

        <!-- Pagination -->
        <div id="pagination"></div>
      </section>

    </div>
  </main>

  <!-- ═══════════════════════════════════════
       FOOTER
       ═══════════════════════════════════════ -->
  <footer class="footer" role="contentinfo">
    <div class="container">
      <p class="footer__text">
        Built with ✨ by Berke Durdu · Data from <a href="https://www.omdbapi.com/" target="_blank" rel="noopener noreferrer">OMDb API</a>
      </p>
    </div>
  </footer>

  <!-- ═══════════════════════════════════════
       MODAL OVERLAY
       ═══════════════════════════════════════ -->
  <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-label="Movie details"></div>

  <!-- Utility class -->
  <style>
    .hidden { display: none !important; }
  </style>

  <!-- App Entry Point -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
